<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Department - Salamtak</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    min-height:100vh;
    padding:40px 15px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h2{
    color:#1C4D8D;
    font-size:32px;
    margin-bottom:8px;
}

.header p{
    color:gray;
}

.card{
    background:#f8fbff;
    padding:25px;
    border-radius:15px;
    border:1px solid #e3edf9;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#1C4D8D;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

input:focus,
textarea:focus{
    border-color:#1C4D8D;
    outline:none;
    box-shadow:0 0 8px rgba(28,77,141,0.2);
}

textarea{
    resize:none;
    height:140px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1C4D8D,#0F2854);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#1C4D8D;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>🏥 Update Department</h2>
    <p>Edit department information</p>
</div>

<div class="card">

<form method="POST">

<div class="form-group">

<label>Department Name</label>

<input type="text"
       name="name"
       value="{{ department[1] }}"
       required>

</div>

<div class="form-group">

<label>Description</label>

<textarea name="description" required>{{ department[2] }}</textarea>

</div>

<button type="submit" class="btn">
    ✔ Update Department
</button>

</form>

</div>

<a href="/departments" class="back">
    ⬅ Back to Departments
</a>

</div>

</body>
</html>
