<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Prescriptions - Salamtak</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    min-height:100vh;
    padding:40px 20px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:25px;
}

.header h2{
    color:#1C4D8D;
    font-size:32px;
}

.header p{
    color:gray;
}

/* SEARCH (UPDATED STYLE LIKE MEDICINES PAGE) */
.search-box{
    margin-bottom:25px;
}

.search-form{
    display:flex;
    gap:10px;
    justify-content:center;
    align-items:center;
}

.search-form input{
    width:85%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.search-form input:focus{
    border-color:#1C4D8D;
    outline:none;
    box-shadow:0 0 8px rgba(28,77,141,0.2);
}

.search-btn{
    padding:14px 22px;
    border:none;
    border-radius:10px;
    background:#1C4D8D;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.search-btn:hover{
    background:#163d73;
}

/* TABLE */
.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1C4D8D;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f9ff;
}

/* BADGE */
.badge{
    background:#e8f1ff;
    color:#1C4D8D;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

/* EMPTY STATE */
.no-data{
    text-align:center;
    color:gray;
    padding:20px;
}

/* BACK BUTTON */
.back-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:#f1f5f9;
    color:#1C4D8D;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.back-btn:hover{
    background:#dbe7f7;
}

/* MOBILE */
@media(max-width:768px){
    .search-form{
        flex-direction:column;
    }

    .search-form input{
        width:100%;
    }

    .search-btn{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>💊 Pharmacy Prescriptions</h2>
        <p>Manage and review all prescriptions</p>
    </div>

    <!-- SEARCH -->
    <div class="search-box">

        <form method="GET" action="/pharmacy_prescriptions" class="search-form">

            <input type="text"
                   name="search"
                   placeholder="Search by ID, doctor, patient or date..."
                   value="{{ search }}">

            <button type="submit" class="search-btn">
                🔍 Search
            </button>

        </form>

    </div>

    <!-- TABLE -->
    <div class="table-wrapper">

        <table>

            <tr>
                <th>ID</th>
                <th>Appointment</th>
                <th>Doctor</th>
                <th>Patient</th>
                <th>Date</th>
            </tr>

            {% if prescriptions %}

                {% for p in prescriptions %}
                <tr>
                    <td>{{ p[0] }}</td>
                    <td>{{ p[1] }}</td>
                    <td><strong>{{ p[2] }}</strong></td>
                    <td>{{ p[3] }}</td>
                    <td>
                        <span class="badge">{{ p[4] }}</span>
                    </td>
                </tr>
                {% endfor %}

            {% else %}

                <tr>
                    <td colspan="5" class="no-data">
                        No prescriptions found
                    </td>
                </tr>

            {% endif %}

        </table>

    </div>

    <!-- BACK -->
    <a href="/pharmacist" class="back-btn">
        ⬅ Back
    </a>

</div>

</body>
</html>
