<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Doctor - Salamtak</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    min-height:100vh;
    padding:40px 15px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h2{
    color:#1C4D8D;
    font-size:32px;
    margin-bottom:8px;
}

.header p{
    color:gray;
    font-size:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full{
    grid-column:1/3;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    color:#1C4D8D;
    font-weight:bold;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    border-color:#1C4D8D;
    outline:none;
    box-shadow:0 0 8px rgba(28,77,141,0.2);
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1C4D8D,#0F2854);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    opacity:0.95;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#1C4D8D;
    font-weight:bold;
    transition:0.3s;
}

.back:hover{
    color:#0F2854;
}

.card{
    background:#f8fbff;
    padding:25px;
    border-radius:15px;
    border:1px solid #e3edf9;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>✏ Update Doctor</h2>
    <p>Edit doctor information and clinic details</p>
</div>

<div class="card">

<form method="POST">

<div class="form-grid">

<div class="input-group">
    <label>Specialization</label>

    <input type="text"
           name="specialization"
           value="{{ doctor[2] }}"
           placeholder="Enter specialization"
           required>
</div>

<div class="input-group">
    <label>Experience Years</label>

    <input type="number"
           name="experience"
           value="{{ doctor[3] }}"
           placeholder="Years of experience"
           required>
</div>

<div class="input-group full">
    <label>Clinic Address</label>

    <input type="text"
           name="address"
           value="{{ doctor[4] }}"
           placeholder="Enter clinic address"
           required>
</div>

<div class="full">
    <button type="submit" class="btn">
        ✔ Update Doctor
    </button>
</div>

</div>

</form>

</div>

<a href="/doctors" class="back">
    ⬅ Back to Doctors List
</a>

</div>

</body>
</html>
