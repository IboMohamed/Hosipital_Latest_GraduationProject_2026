<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments - Salamtak</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    padding:40px 20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.header h2{
    color:#1C4D8D;
    font-size:32px;
}

.header p{
    color:gray;
    margin-top:5px;
}
/* SEARCH */

.search-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    width:86%;
    padding:12px 15px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    transition:.3s;
}

.search-box input:focus{
    border-color:#1C4D8D;
    box-shadow:0 0 5px rgba(28,77,141,.3);
}

.search-box button{
    padding:12px 18px;
    background:#1C4D8D;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.search-box button:hover{
    background:#163d73;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1C4D8D;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f9ff;
}

.status{
    padding:7px 12px;
    border-radius:20px;
    color:white;
    font-size:13px;
    font-weight:bold;
}

.pending{
    background:#ffc107;
    color:black;
}

.completed{
    background:#28a745;
}

.cancelled{
    background:#dc3545;
}

.back{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:#f1f5f9;
    color:#1C4D8D;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.back:hover{
    background:#dbe7f7;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div>
    <h2>📅 Appointments</h2>
    <p>Manage hospital appointments</p>
</div>

</div>
<form class="search-box" method="GET" action="/appointments">

    <input
        type="text"
        name="search"
        placeholder="Search by ID, patient, doctor, date or status..."
        value="{{ search }}"
    >

    <button type="submit">
        🔍 Search
    </button>

</form>
<div class="table-wrapper">

<table>

<tr>
    <th>ID</th>
    <th>Patient</th>
    <th>Doctor</th>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for a in appointments %}

<tr>

<td>{{ a[0] }}</td>
<td>{{ a[1] }}</td>
<td>{{ a[2] }}</td>
<td>{{ a[3] }}</td>

<td>

{% if a[4] == 'Completed' %}

<span class="status completed">
    ✔ Completed
</span>

{% elif a[4] == 'Cancelled' %}

<span class="status cancelled">
    ✖ Cancelled
</span>

{% else %}

<span class="status pending">
    ⏳ Pending
</span>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

<a href="/admin" class="back">
    ⬅ Back to Admin Panel
</a>

</div>

</body>
</html>
