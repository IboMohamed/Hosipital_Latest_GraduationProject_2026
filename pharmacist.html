<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacist Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
    color:#1C4D8D;
    margin-bottom:10px;
    font-size:34px;
}

p{
    color:gray;
    margin-bottom:35px;
}

.cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#f5f9ff;
    padding:35px 20px;
    border-radius:16px;
    text-decoration:none;
    transition:0.3s;
    border:1px solid #dbe8ff;
}

.card:hover{
    transform:translateY(-5px);
    background:#eaf2ff;
}

.icon{
    font-size:45px;
    margin-bottom:15px;
}

.card h3{
    color:#1C4D8D;
    margin-bottom:10px;
}

.card p{
    font-size:14px;
    margin:0;
}

.logout{
    display:inline-block;
    margin-top:30px;
    padding:12px 20px;
    background:#1C4D8D;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.logout:hover{
    background:#163d73;
}

@media(max-width:768px){

    .cards{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="container">

    <h2>💊 Pharmacist Dashboard</h2>

    <p>Manage pharmacy operations efficiently</p>

    <div class="cards">

        <a href="/medicines_stock" class="card">
            <div class="icon">💊</div>
            <h3>Medicines Stock</h3>
            <p>Manage medicines inventory and stock</p>
        </a>

        <a href="/pharmacy_prescriptions" class="card">
            <div class="icon">📄</div>
            <h3>Prescriptions</h3>
            <p>View and manage prescriptions</p>
        </a>

    </div>

    <a href="/logout" class="logout">
        🚪 Logout
    </a>

</div>

</body>
</html>
