<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add User - Salamtak</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    padding:40px 15px;
}

.container{
    max-width:750px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
    text-align:center;
    color:#1C4D8D;
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.full{
    grid-column:1/3;
}

input, select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

input:focus,
select:focus{
    border-color:#1C4D8D;
    outline:none;
    box-shadow:0 0 8px rgba(28,77,141,0.2);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1C4D8D,#0F2854);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.hidden{
    display:none;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#1C4D8D;
    font-weight:bold;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }

}

</style>
</head>

<body>

<div class="container">

<h2>➕ Add Doctor / Pharmacist</h2>

<form method="POST">

<div class="form-grid">

<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="middle_name" placeholder="Middle Name">

<input type="text" name="last_name" placeholder="Last Name" required>
<input type="email" name="email" placeholder="Email">

<input type="text" name="phone" placeholder="Phone">
<input type="text" name="phone2" placeholder="Phone 2">

<select name="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
</select>

<input type="date" name="birth_date">

<input type="password" name="password" placeholder="Password" class="full" required>

<select name="role" id="role" onchange="toggleFields()" class="full" required>
    <option value="">Select Role</option>
    <option value="doctor">Doctor</option>
    <option value="pharmacist">Pharmacist</option>
</select>

<div id="doctorFields" class="hidden full">
    <input type="text" name="specialization" placeholder="Specialization">
    <br><br>
    <input type="number" name="experience" placeholder="Experience Years">
    <br><br>
    <input type="text" name="address" placeholder="Clinic Address">
</div>

<div id="pharmacyFields" class="hidden full">
    <input type="text" name="pharmacy_name" placeholder="Pharmacy Name">
    <br><br>
    <input type="text" name="location" placeholder="Location">
</div>

<div class="full">
    <button type="submit" class="btn">
        ✔ Add User
    </button>
</div>

</div>

</form>

<a href="/admin" class="back">
    ⬅ Back to Admin Panel
</a>

</div>

<script>

function toggleFields(){

    let role = document.getElementById("role").value;

    document.getElementById("doctorFields").style.display =
        role === "doctor" ? "block" : "none";

    document.getElementById("pharmacyFields").style.display =
        role === "pharmacist" ? "block" : "none";
}

</script>

</body>
</html>
