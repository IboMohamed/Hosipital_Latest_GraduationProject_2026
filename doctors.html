<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctors - Salamtak</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0F2854,#1C4D8D);
    min-height:100vh;
    padding:40px 20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.header{
    margin-bottom:30px;
}

.header h2{
    color:#1C4D8D;
    font-size:32px;
    margin-bottom:5px;
}

.header p{
    color:gray;
}

.table-wrapper{
    overflow-x:auto;
}

/* SEARCH */

.search-box{
    display:flex;
    justify-content:center;
    width: 100%;
    align-items:center;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    width:80%;
    padding:12px 15px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    transition:.3s;
}

.search-box input:focus{
    border-color:#1C4D8D;
    box-shadow:0 0 5px rgba(28,77,141,.3);
}

.search-box button{
    padding:12px 18px;
    background:#1C4D8D;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.search-box button:hover{
    background:#163d73;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1C4D8D;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f9ff;
}

.experience{
    background:#e8f1ff;
    color:#1C4D8D;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.action-btn{
    text-decoration:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

.edit{
    background:#e8f1ff;
    color:#1C4D8D;
}

.delete{
    background:#ffe5e5;
    color:#dc3545;
}

.back-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:#f1f5f9;
    color:#1C4D8D;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>👨‍⚕️ Doctors List</h2>
    <p>Manage hospital doctors and specialists</p>
</div>
<form class="search-box" method="GET" action="/doctors">

    <input
        type="text"
        name="search"
        placeholder="Search by ID, name, specialization or experience..."
        value="{{ search }}"
    >

    <button type="submit">
        🔍 Search
    </button>

</form>
<div class="table-wrapper">

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Specialization</th>
    <th>Experience</th>
    <th>Actions</th>
</tr>

{% for d in doctors %}

<tr>

    <td>{{ d[0] }}</td>

    <td>
        <strong>{{ d[1] }}</strong>
    </td>

    <td>{{ d[2] }}</td>

    <td>
        <span class="experience">
            {{ d[3] }} Years
        </span>
    </td>

    <td>

        <a href="/update_doctor/{{ d[0] }}" class="action-btn edit">
            ✏ Edit
        </a>

        <a href="/delete_doctor/{{ d[0] }}"
           onclick="return confirm('Delete this doctor?')"
           class="action-btn delete">
            🗑 Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

</div>

<a href="/admin" class="back-btn">
    ⬅ Back to Admin Panel
</a>

</div>

</body>
</html>
