<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Register - Salamtak</title>
<link rel="icon" href="{{ url_for('static', filename='icon2.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial;
        background: linear-gradient(135deg, #0F2854, #1C4D8D);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        margin: 0;
        padding: 40px 15px;
    }

    .box {
        background: white;
        padding: 35px;
        border-radius: 18px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .logo img {
        width: 120px;
        margin-bottom: 10px;
    }

    h2 {
        color: #1C4D8D;
        margin-bottom: 15px;
    }

    .input-group {
        margin-bottom: 12px;
        text-align: left;
    }

    input, select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
    }

    input:focus, select:focus {
        border-color: #1C4D8D;
        outline: none;
        box-shadow: 0 0 5px rgba(28,77,141,0.3);
    }

    .name-group {
        display: flex;
        gap: 5px;
          padding: 12px;
    }

    .name-group input {
        flex:1;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #1C4D8D;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
    }

    button:hover {
        background: #163a6b;
    }

    .login-link {
        display: block;
        margin-top: 15px;
        color: #1C4D8D;
        text-decoration: none;
        font-size: 14px;
    }

    .login-link:hover {
        text-decoration: underline;
    }

    .error {
        color: red;
        font-size: 14px;
    }
</style>

</head>
<body>

<div class="box">

<div class="logo">
    <!-- 🔥 حطي اللوجو هنا -->
    <img src="{{ url_for('static', filename='icon2.png') }}">
</div>

<h2>Create Account</h2>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

    <!-- 🔥 الاسم الثلاثي -->
     
    <div class="name-group">
        <input name="first_name" placeholder="first name" required>
        <input name="middle_name" placeholder="middle name" required>
        <input name="last_name" placeholder="last name" required>
    </div>

    <div class="input-group">
        <input name="email" placeholder="Email" required>
    </div>

    <div class="input-group">
        <input name="phone" placeholder="Phone Number" required>
    </div>

    <div class="input-group">
        <input name="phone2" placeholder="Second Phone (optional)">
    </div>

    <div class="input-group">
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div class="input-group">
        <input type="date" name="birth_date" required>
    </div>

    <div class="input-group">
        <select name="role">
    <option value="patient">Patient</option>
</select>
    </div>

    <div class="input-group">
        <input type="password" name="password" placeholder="Password" required>
    </div>

    <div class="input-group">
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
    </div>
    <div class="input-group">
    <input name="address" placeholder="Address">
    </div>

    <div class="input-group">
    <input name="emergency_contact" placeholder="Emergency Contact">
    </div>
    <button type="submit">Register</button>
</form>

<a href="/login" class="login-link">
    Already have an account? Login
</a>

</div>

</body>
</html>
